server:
  port: 8081

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/capstone_db_prod
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# Production-specific logging configuration
logging:
  file:
    name: logs/customer-service-prod.log
    max-size: 10MB
    max-history: 60
    total-size-cap: 1GB
  level:
    root: WARN
    org.credera.training: INFO
    org.credera.training.customerservice.rest.CustomerController: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Production environment indicator
app:
  environment: "PRODUCTION"
  debug: false