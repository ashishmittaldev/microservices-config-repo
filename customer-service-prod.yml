server:
  port: 8081

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/capstone_db_prod
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# Production-specific configurations
logging:
  level:
    org.credera.training: WARN
    org.springframework: WARN
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Production environment indicator
app:
  environment: "PRODUCTION"
  debug: false