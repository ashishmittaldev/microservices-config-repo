server:
  port: 8572

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/capstone_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Dev-specific logging configuration
logging:
  file:
    name: logs/customer-service-dev.log
    max-size: 10MB
    max-history: 30
  level:
    root: INFO
    org.credera.training: DEBUG
    org.credera.training.customerservice.rest.CustomerController: INFO
    org.springframework.web: DEBUG
    org.springframework.cloud: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh,env,configprops

# Dev environment indicator
app:
  environment: "DEVELOPMENT"
  debug: true